spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:codechronicles;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  servlet:
    session:
      timeout: 2m

blog:
  jwt:
    secret: codechronicles-test-jwt-secret-please-change-32bytes
    expiration-ms: 7200000
  redis:
    key-prefix: cc:test
    captcha-expiration: 2m
