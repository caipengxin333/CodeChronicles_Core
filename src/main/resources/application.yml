server:
  port: 8080

spring:
  application:
    name: codechronicles-core
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:codechronicles;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

blog:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
