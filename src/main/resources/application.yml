server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 2m

spring:
  config:
    import: optional:file:.env.local[.properties]
  application:
    name: codechronicles-core
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:codechronicles}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  sql:
    init:
      mode: never
      schema-locations: classpath:db/mysql/schema.sql
      data-locations: classpath:db/mysql/data.sql
  ai:
    openai:
      # 如果用 DeepSeek，改成 https://api.deepseek.com
      # 如果用 OpenAI，改成 https://api.openai.com（或者不填，默认就是这个）
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}   # 从环境变量读取，不要直接写在配置文件里
      chat:
        options:
          model: deepseek-chat        # DeepSeek-V3 的模型名
          temperature: 0.7

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.codechronicles.core.mapper: ${MYBATIS_LOG_LEVEL:DEBUG}

blog:
  jwt:
    secret: ${JWT_SECRET:codechronicles-default-jwt-secret-please-change-32bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:7200000}
  redis:
    key-prefix: ${REDIS_KEY_PREFIX:cc}
    captcha-expiration: 2m
  interaction:
    like-interval: ${LIKE_INTERVAL:3s}
    comment-interval: ${COMMENT_INTERVAL:10s}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
